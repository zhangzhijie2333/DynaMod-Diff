diffusion:
  target: ldm.models.diffusion.ldm.LatentDiffusion
  params:
    linear_start: 0.00085
    linear_end: 0.012
    timesteps: 1000
   

model:
  target: ldm.modules.diffusionmodules.openaimodel.UNetModel
  params:
    image_size: 64
    in_channels: 4
    out_channels: 4
    model_channels: 320
    attention_resolutions: [4, 2, 1]
    num_res_blocks: 2
    channel_mult: [1, 2, 4, 4]
    num_heads: 8
    transformer_depth: 1
    context_dim: 768
    fuser_type: gatedSA
    use_checkpoint: True

 
    use_mask_modules: True
    build_mask_modules: True
    enable_affine_combiner: False


    enable_linear_mask: True
    enable_conv_mask: True

 
    debug_mask_build: True
    debug_mask_detail: True


    mask_hidden_dim: 64
    mask_base_factor: 4    #default 4


    sem_in_dim: 152
    use_sem_cond: True


    use_sem_cond_for_linear_mask: True  
    use_sem_cond_for_conv_mask: False    


    linear_mask_targets: ["SpatialTransformer"]  #  ["ResBlock"], ["SpatialTransformer"], ["Upsample"]
    skip_linear_layers: ["time_emb_proj", "ff", "conv_shortcut", "proj_in", "proj_out"]


    conv_mask_targets: ["ResBlock"] # ["ResBlock"], ["SpatialTransformer"], ["Upsample"],
    conv_mask_skip_1x1: True
    conv_mask_skip_groups_not1: True       
    conv_mask_include_resblock_skip: False   


    grounding_downsampler:
      target: ldm.modules.diffusionmodules.sem_grounding_downsampler.GroundingDownsampler
      params:
        in_dim: 152
        resize_input: 256
        out_dim: 8 

    grounding_tokenizer:
      target: ldm.modules.diffusionmodules.sem_grounding_net.PositionNet
      params:
        in_dim: 152
        resize_input: 256
        out_dim: 768


autoencoder:
  target: ldm.models.autoencoder.AutoencoderKL
  params:
    scale_factor: 0.18215 
    embed_dim: 4
    ddconfig:
      double_z: true
      z_channels: 4
      resolution: 512
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 2
      - 4
      - 4
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0

      use_decoder_mask: False
      build_decoder_mask_modules: False
      decoder_mask_hidden_dim: 64
      decoder_mask_base_factor: 4
      decoder_mask_use_affine: True
      decoder_mask_use_highfreq_cond: True
      decoder_mask_highfreq_in_dim: 2
      decoder_mask_highfreq_mode: "sobel"
      decoder_mask_skip_1x1: True
      decoder_mask_skip_groups_not1: True
      decoder_mask_include_shortcut: False
      decoder_mask_include_upsample: True
      decoder_mask_hard: True
      debug_decoder_mask: True

      decoder_enable_affine_combiner: False
      decoder_mask_build_verbose: True

      decoder_mask_use_sem_cond: True
      decoder_mask_sem_in_dim: 152




use_loss_attn: true
lambda_attn: 1.0
attn_loss_normalize: true

text_encoder:
  target: ldm.modules.encoders.modules.FrozenCLIPEmbedder




train_dataset_names: 
  Mvtec_anomaly:
    prob_use_caption: 1
    image_size: 512
    random_flip: True

    # ===== paired image-mask spatial augmentation =====
    paired_aug_enable: true
    paired_aug_prob: 0.9
    paired_aug_crop_prob: 0.9
    paired_aug_crop_scale_min: 0.65
    paired_aug_crop_scale_max: 1.0
    paired_aug_crop_ratio_min: 0.85
    paired_aug_crop_ratio_max: 1.15
    paired_aug_translate_prob: 0.9
    paired_aug_translate_frac: 0.12
    paired_aug_rotate_prob: 0.9
    paired_aug_rotate_deg: 18.0
    paired_aug_min_fg_keep_ratio: 0.93
    paired_aug_max_tries: 30
    paired_aug_apply_to_normal: true
    debug_aug: false

grounding_tokenizer_input:
  target: grounding_input.sem_grounding_tokinzer_input.GroundingNetInput


grounding_downsampler_input:
  target: grounding_input.sem_grounding_downsampler_input.GroundingDSInput

save_attn_heatmap_every: 0
save_attn_heatmap_layers: false
save_attn_heatmap_max_samples: 1
